<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Melo - Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
<div class="phone-frame no-select">

  <div class="topbar">
    <div class="app-logo">M<span>elo</span></div>
    <div class="topbar-actions">
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeIcon">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-input-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search songs, artists..." autocomplete="off">
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="player">Now Playing</button>
    <button class="tab-btn" data-tab="songs">Library</button>
    <button class="tab-btn" data-tab="liked">Liked</button>
    <button class="tab-btn" data-tab="recent">Recent</button>
  </div>

  <div class="screen">
    <div class="view active" id="view-player">
      <div class="cd-stage">
        <div class="disc" id="disc"></div>
        <div class="album-cover" id="albumCover">
          <img id="albumImg" src="" alt="Album Art">
        </div>
      </div>

      <div class="song-meta">
        <div class="song-title" id="songTitle">Select a Song</div>
        <div class="song-artist" id="songArtist">Melo Music</div>
      </div>

      <div class="song-actions-row">
        <button class="like-btn" id="playerLikeBtn" title="Like">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div style="flex:1"></div>
        <button class="more-btn" id="playerMoreBtn" title="More">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar-track" id="progressTrack">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="ctrl-btn" id="prevBtn" title="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="playBtn" title="Play/Pause">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-1.5 6L6 18V6l8.5 6z"/></svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" title="Repeat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80">
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>
    </div>

    <div class="view" id="view-songs">
      <div class="list-header">
        <div class="list-header-top">
          <div class="list-section-title">All Songs</div>
          <div class="list-count" id="songsCount"></div>
        </div>
      </div>
      <div class="song-list" id="songList"></div>
    </div>

    <div class="view" id="view-liked">
      <div class="list-header">
        <div class="list-header-top">
          <div class="list-section-title">❤️ Liked Songs</div>
          <div class="list-count" id="likedCount"></div>
        </div>
      </div>
      <div class="song-list" id="likedList"></div>
    </div>

    <div class="view" id="view-recent">
      <div class="list-header">
        <div class="list-header-top">
          <div class="list-section-title">Recently Played</div>
          <div class="list-count" id="recentCount"></div>
        </div>
      </div>
      <div class="song-list" id="recentList"></div>
    </div>
  </div>

  <div class="mini-player" id="miniPlayer">
    <div class="mp-thumb"><img id="mpImg" src="" alt=""></div>
    <div class="mp-info">
      <div class="mp-title" id="mpTitle">-</div>
      <div class="mp-artist" id="mpArtist">-</div>
    </div>
    <button class="mp-ctrl-btn" id="mpPlayBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="mpIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

</div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxLike"><span>❤️</span> Like</div>
  <div class="ctx-item" id="ctxSave"><span>📌</span> Save</div>
  <div class="ctx-item" id="ctxDownload"><span>⬇️</span> Download</div>
</div>

<div class="toast" id="toast"></div>

<audio id="audioPlayer"></audio>

<script src="script.js"></script>
</body>
</html>
